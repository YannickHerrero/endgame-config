name: Build Firmware

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build endgame zmk_port keymap with QMK Docker workflow
        run: |
          set -euo pipefail
          git clone --depth 1 --recurse-submodules https://github.com/qmk/qmk_firmware.git qmk_firmware
          rm -rf qmk_firmware/keyboards/endgame
          cp -r keyboards/endgame qmk_firmware/keyboards/endgame
          (cd qmk_firmware && util/docker_build.sh endgame:zmk_port)

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: |
            qmk_firmware/.build/endgame_zmk_port.*
            qmk_firmware/endgame_zmk_port.*
